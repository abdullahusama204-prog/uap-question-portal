<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27%3E%F0%9F%8E%93%3C/text%3E%3C/svg%3E">
  <meta name="theme-color" content="#B8862F">
  <title>Semester · UAP Question Archive</title>

  <script>(function(){try{if(localStorage.getItem('uap-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>

  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/navbar.css">
  <link rel="stylesheet" href="assets/css/buttons.css">
  <link rel="stylesheet" href="assets/css/viewer.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>

  <div id="navbar-placeholder"></div>
  <div class="auth-gate" id="authGate"></div>

  <section class="page-hero">
    <span class="eyebrow">Semester</span>
    <h1 id="batchTitle">Semester</h1>
    <p>Pick an exam type to see its sections and question papers.</p>
  </section>

  <div class="batch" id="examLinks"></div>

  <div id="footer-placeholder"></div>

  <script src="assets/js/archive-data.js"></script>

  <!-- Firebase (Authentication) -->
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/toast.js"></script>
  <script src="assets/js/admin-config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>document.addEventListener("DOMContentLoaded", () => { if (window.UAPAuth) window.UAPAuth.requireAuth(); });</script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(location.search);
      const batchId = params.get("batch");
      const data = window.UAP_DATA;
      const batch = data.batches.find(b => b.id === batchId);

      document.getElementById("batchTitle").textContent = batch ? batch.label : "Semester not found";

      const examLinks = document.getElementById("examLinks");
      if (batch) {
        examLinks.innerHTML = data.exams.map(exam => `
          <a href="questions.html?batch=${batch.id}&exam=${exam.id}&section=A">${exam.label}</a>
        `).join("");
      } else {
        examLinks.innerHTML = `<p style="color:var(--text-soft)">Go back to <a href="previous.html" style="color:var(--accent)">Previous Questions</a>.</p>`;
      }
    });
  </script>

  <script src="assets/js/theme.js"></script>
  <script src="assets/js/search.js"></script>
  <script src="assets/js/navbar.js"></script>
  <script src="assets/js/footer.js"></script>
</body>
</html>
