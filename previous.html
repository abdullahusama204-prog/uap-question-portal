<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27%3E%F0%9F%8E%93%3C/text%3E%3C/svg%3E">
  <meta name="theme-color" content="#B8862F">
  <title>Previous Questions · UAP Question Archive</title>

  <script>(function(){try{if(localStorage.getItem('uap-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>

  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/navbar.css">
  <link rel="stylesheet" href="assets/css/buttons.css">
  <link rel="stylesheet" href="assets/css/viewer.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>

  <div id="navbar-placeholder"></div>
  <div class="auth-gate" id="authGate"></div>

  <section class="page-hero">
    <span class="eyebrow" data-i18n="previous_eyebrow">Archive</span>
    <h1 data-i18n="previous_h1">Previous Questions</h1>
    <p data-i18n="previous_sub">Browse all previous exam questions organized by semester. Select a semester below to access CT, Mid and Final questions.</p>

    <div class="hero-stats" id="statsRow"></div>
  </section>

  <section class="batch-container" id="batchContainer"></section>

  <div id="footer-placeholder"></div>

  <script src="assets/js/archive-data.js"></script>
  <script src="assets/js/i18n.js"></script>

  <!-- Firebase (Authentication) -->
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/toast.js"></script>
  <script src="assets/js/admin-config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>document.addEventListener("DOMContentLoaded", () => { if (window.UAPAuth) window.UAPAuth.requireAuth(); });</script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const data = window.UAP_DATA;
      const container = document.getElementById("batchContainer");
      const stats = document.getElementById("statsRow");

      const T = window.UAPI18N ? window.UAPI18N.t : (k) => k;

      container.innerHTML = data.batches.map((b, i) => `
        <div class="batch-card fade-in-item" style="--i:${i}" id="${b.id}">
          <h2>🎓 ${b.label}</h2>
          <p>✅ CT Questions</p>
          <p>✅ Mid Questions</p>
          <p>✅ Final Questions</p>
          <a href="batch.html?batch=${b.id}" class="open-btn" data-i18n="home_open">${T("home_open")}</a>
        </div>
      `).join("");

      stats.innerHTML = `
        <div class="stat-card"><h3>${data.batches.length}</h3><span data-i18n="stat_semesters">${T("stat_semesters")}</span></div>
        <div class="stat-card"><h3>CT</h3><span data-i18n="stat_available">${T("stat_available")}</span></div>
        <div class="stat-card"><h3>Mid</h3><span data-i18n="stat_available">${T("stat_available")}</span></div>
        <div class="stat-card"><h3>Final</h3><span data-i18n="stat_available">${T("stat_available")}</span></div>
      `;
    });
  </script>

  <script src="assets/js/theme.js"></script>
  <script src="assets/js/search.js"></script>
  <script src="assets/js/navbar.js"></script>
  <script src="assets/js/footer.js"></script>
</body>
</html>
